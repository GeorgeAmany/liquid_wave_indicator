name: liquid_progress_indicator
description: >-
  Animated liquid wave fill for any 0–100% (or 0.0–1.0) metric: goals, storage,
  skills, health, social reach, etc. Row helpers + tall dashboard section. Pure Flutter.
version: 0.1.5
homepage: https://github.com/GeorgeAmany/liquid_progress_indicator
repository: https://github.com/GeorgeAmany/liquid_progress_indicator
issue_tracker: https://github.com/GeorgeAmany/liquid_progress_indicator/issues

environment:
  sdk: ^3.9.2
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

topics:
  - animation
  - ui
  - widget
